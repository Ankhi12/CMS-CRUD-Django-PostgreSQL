
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body{
            background-color: rgb(182, 223, 238) !important;
        }
    </style>
</head>
<body class="container mt-5 d-grid">
    <div class="row">
        <div class="col-12">
            <h1>Welcome back to MyCMS</h1>
        </div>
    </div>
    
    <div class="row">
        <div class="col-12">
            <div class="container-fluid min-vh-100 d-flex justify-content-center align-items-center">
        
            <form method="post" class="bg-light p-4 rounded shadow col-11 col-md-8 col-lg-6">
                <h1>Login</h1>
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn btn-primary">Login</button>
                <a href= "{% url 'home' %}" class="btn btn-primary" role="button">Back</a>
            </form>
    </div>
        </div>
    </div>
    
</body>
</html>
