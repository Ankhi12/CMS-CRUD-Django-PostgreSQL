
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&display=swap" rel="stylesheet">
    <style>
          body {
            font-family: 'Orbitron', sans-serif !important;
            background-color: rgb(213, 217, 220) !important;
            }
    </style>

</head>
<body class="container mt-5">
    {% extends 'content/base.html' %}
    {% load static %}
    {% block content %}

    <div class="container text-center mt-5">
        <h1>MyCMS - An easy-to-use platform</h1>
    </div>
    <div class="container my-5">
        <div class="row align-items-center">
        <!-- Left Column: Text -->
        <div class="col-md-6">
             <p>CMSs can be messy. But it does not have to. <br/>
            With MyCMS, you can create, edit, or delete your posts anytime you want.
            So, try it out.
            </p>
            <a href="{% url 'login' %}" class="btn btn-primary me-2">Login</a>
            <a href="{% url 'register' %}" class="btn btn-success">Sign Up</a>
            
        </div>

        <!-- Right Column: Image -->
        <div class="col-md-6 text-center">
            <div class="d-flex justify-content-center align-items-center" style="min-height: 70vh;">
                <img src="{% static 'images/banner.jpg'%}" class="img-fluid" alt="CMS Hero Image" style="max-width: 400px;">
            </div>
         </div>
    </div>
    {% endblock %}
</body>
</html>
